<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting...</title>
  <script>
    // Preserve the full URL (path + search + hash) across the GitHub Pages 404 redirect.
    // The SPA entry point reads this from sessionStorage and restores it via history.replaceState
    // before React Router initialises, so client-side routing works for non-prerendered routes.
    sessionStorage.setItem('spa_redirect', window.location.href);
    window.location.replace('/');
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/" />
  </noscript>
</head>
<body>
  <p>If you are not redirected automatically, <a href="/">click here</a>.</p>
</body>
</html>
